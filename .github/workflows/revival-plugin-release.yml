name: Build RevivalRitual Plugin

on:
  push:
    tags:
      - 'revival-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build plugin jar
        working-directory: revival-plugin
        run: ./gradlew jar

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: revival-plugin/build/libs/RevivalRitual.jar
